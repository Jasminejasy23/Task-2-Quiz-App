<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="quiz-container">

  <h1>📝 Quiz App</h1>

  <div id="category-screen">
    <h2>Select Category</h2>

    <button class="category-btn" data-category="html">HTML Quiz</button>
    <button class="category-btn" data-category="css">CSS Quiz</button>
    <button class="category-btn" data-category="js">JavaScript Quiz</button>
  </div>

  <div id="quiz-screen" class="hide">

    <div class="quiz-header">
      <span id="question-number"></span>
      <span id="score-display">Score: 0</span>
    </div>

    <div class="progress-bar">
      <div id="progress"></div>
    </div>

    <p id="timer">⏳ Time Left: 15s</p>

    <h2 id="question"></h2>

    <div id="answer-buttons"></div>

    <button id="next-btn">Next Question</button>

  </div>

  <div id="score-container" class="hide">
    <h2>🎉 Quiz Completed</h2>

    <p id="score-text"></p>

    <p id="high-score"></p>

    <button id="restart-btn">Play Again</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
